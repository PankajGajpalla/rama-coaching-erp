<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <!-- P letter -->
  <text x="18" y="68" font-family="Arial Black, Helvetica Neue, Arial, sans-serif"
        font-weight="900" font-size="58" fill="#ffffff" letter-spacing="-1">P</text>
  <!-- M letter in blue -->
  <text x="52" y="68" font-family="Arial Black, Helvetica Neue, Arial, sans-serif"
        font-weight="900" font-size="58" fill="#3b82f6" letter-spacing="-1">M</text>
  <!-- bottom tagline -->
  <text x="50" y="86" font-family="Arial, sans-serif" font-weight="600"
        font-size="10" fill="#94a3b8" text-anchor="middle" letter-spacing="2">CORETECH</text>
</svg>
